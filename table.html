<!DOCTYPE html>
<html>
    <head>
        <title>table</title>
    </head>
    <style>
        table,th,td{
            border: 1px solid black;
            border-collapse: collapse;
            border-radius: 10px;
            border-style: dotted;
            border-color: blue;
        }
        th,td{
            background-color: aquamarine;
        }
    </style>
    <body>
        <table style="width: 100%;">
            <tr>
                <th style="width: 70%;">name</th>
                <th>id</th>
                <th>pnumber</th>
            </tr>
            <tr>
                <td style="height: 200px;">one</td>
                <td>on</td>
                <td>o</td>
            </tr>
            <tr>
                <td>one</td>
                <td>on</td>
                <td>o</td>
            </tr>
        </table>
    </body>
</html>
